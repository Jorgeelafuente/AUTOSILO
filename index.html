<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Extractor Silomar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:800px;
margin:auto;
}

button{
padding:10px 20px;
margin-top:10px;
}

pre{
background:#eee;
padding:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Extractor PDF Silomar</h2>

<p>Sube el PDF y el Excel maestro</p>

<input type="file" id="pdfFile" accept="application/pdf"><br><br>

<input type="file" id="excelFile" accept=".xlsx"><br><br>

<button onclick="procesar()">Procesar</button>

<h3>Resultado</h3>

<pre id="resultado"></pre>

</div>

<script>

let excelData=[]

document.getElementById("excelFile").addEventListener("change",function(e){

const file=e.target.files[0]
const reader=new FileReader()

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result)

const workbook=XLSX.read(data,{type:'array'})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

excelData=XLSX.utils.sheet_to_json(sheet)

console.log(excelData)

}

reader.readAsArrayBuffer(file)

})

async function procesar(){

const file=document.getElementById("pdfFile").files[0]

const buffer=await file.arrayBuffer()

const pdf=await pdfjsLib.getDocument({data:buffer}).promise

let items=[]

for(let p=1;p<=pdf.numPages;p++){

const page=await pdf.getPage(p)

const content=await page.getTextContent()

content.items.forEach(i=>{

items.push({
text:i.str,
x:i.transform[4],
y:i.transform[5]
})

})

}

console.log(items)

document.getElementById("resultado").textContent="PDF cargado. Items extraídos: "+items.length

}

</script>

</body>
</html>
