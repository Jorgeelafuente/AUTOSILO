<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Extractor SILOMAR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI, Arial;
margin:0;
background:#f2f5f8;
}

.topbar{
background:#0078c8;
color:white;
padding:15px 30px;
font-size:20px;
font-weight:600;
}

.container{
max-width:1100px;
margin:60px auto;
background:white;
padding:40px;
border-radius:6px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
background:#0078c8;
border:none;
padding:12px 20px;
color:white;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}

.matchExact{
background:#d4edda;
}

.matchFuzzy{
background:#ffe5b4;
}

.matchNone{
background:#111;
color:white;
}

</style>

</head>

<body>

<div class="topbar">
Sistema Operativo Interno
</div>

<div class="container">

<h1>Extractor SILOMAR</h1>

<input type="file" id="pdfFile"><br><br>
<input type="file" id="excelFile"><br><br>

<button id="procesarBtn">Procesar</button>

<div id="resultado"></div>

</div>

<script>

let excelData=[]

document.getElementById("excelFile").addEventListener("change",function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result)

const workbook=XLSX.read(data,{type:'array'})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

excelData=XLSX.utils.sheet_to_json(sheet)

console.log("Excel cargado",excelData)

}

reader.readAsArrayBuffer(file)

})

document.getElementById("procesarBtn").addEventListener("click",procesar)

function similarity(a,b){

a=a.toLowerCase()
b=b.toLowerCase()

let longer=a.length>b.length?a:b
let shorter=a.length>b.length?b:a

let same=0

for(let i=0;i<shorter.length;i++){
if(shorter[i]==longer[i]) same++
}

return same/longer.length

}

async function procesar(){

const resultado=document.getElementById("resultado")

resultado.innerHTML="Procesando..."

const file=document.getElementById("pdfFile").files[0]

const buffer=await file.arrayBuffer()

const pdf=await pdfjsLib.getDocument({data:buffer}).promise

let items=[]

for(let p=1;p<=pdf.numPages;p++){

const page=await pdf.getPage(p)
const content=await page.getTextContent()

content.items.forEach(i=>{

items.push({
text:i.str,
x:i.transform[4],
y:i.transform[5]
})

})

}

const cpRegex=/\b\d{5}\b|\b\d{4}-\d{3}\b/

let filas=[]

items.forEach(i=>{

if(cpRegex.test(i.text)){

filas.push({
cp:i.text.match(cpRegex)[0],
y:i.y
})

}

})

filas.sort((a,b)=>b.y-a.y)

let tabla=[]

filas.forEach(f=>{

let rowItems=items.filter(i=>Math.abs(i.y-f.y)<10)

let row={
destinatario:"",
cp:"",
pallets:"",
bultos:"",
kilos:"",
obs1:"",
obs2:""
}

rowItems.forEach(i=>{

if(i.x<200){

row.destinatario+=" "+i.text

}else if(i.x<320){

row.cp+=" "+i.text

}else if(i.x<380){

row.pallets+=" "+i.text

}else if(i.x<450){

row.bultos+=" "+i.text

}else if(i.x<520){

row.kilos+=" "+i.text

}else if(i.x<650){

row.obs1+=" "+i.text

}else{

row.obs2+=" "+i.text

}

})

tabla.push(row)

})

function limpiarTexto(t){

return t
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/s\.l\.|sl|s\.a\.|sa/g,"")
.trim()

}

function fuzzyScore(a,b){

a=limpiarTexto(a)
b=limpiarTexto(b)

let palabrasA=a.split(" ")
let palabrasB=b.split(" ")

let comunes=0

palabrasA.forEach(p=>{
if(palabrasB.includes(p)) comunes++
})

return comunes/palabrasA.length

}

let html="<table>"
html+="<tr><th>Destino</th><th>CP</th><th>Pallets</th><th>Bultos</th><th>Kilos</th><th>Tier</th></tr>"

tabla.forEach(r=>{

let matchType="matchNone"
let tier="-"

excelData.forEach(e=>{

let nombre=e["DESTINATARIO"]||""
let cpExcel=(e["CÓDIGO POSTAL Y LOCALIDAD"]||"").match(/\d{5}|\d{4}-\d{3}/)

if(cpExcel) cpExcel=cpExcel[0]

if(limpiarTexto(r.destinatario).includes(limpiarTexto(nombre)) && r.cp.includes(cpExcel)){

matchType="matchExact"
tier=e["TIERS"]

}else{

let score=fuzzyScore(r.destinatario,nombre)

if(score>0.5 && r.cp.includes(cpExcel)){

matchType="matchFuzzy"
tier=e["TIERS"]

}

}

})

html+=`
<tr class="${matchType}">
<td>${r.destinatario}</td>
<td>${r.cp}</td>
<td>${r.pallets}</td>
<td>${r.bultos}</td>
<td>${r.kilos}</td>
<td>${tier}</td>
</tr>
`

})

html+="</table>"

resultado.innerHTML=html

}

const cpRegex=/\b\d{5}\b|\b\d{4}-\d{3}\b/

let filas=[]

items.forEach(i=>{

if(cpRegex.test(i.text)){

filas.push({
cp:i.text.match(cpRegex)[0],
y:i.y
})

}

})

filas.sort((a,b)=>b.y-a.y)

let tabla=[]

filas.forEach(f=>{

let rowItems=items.filter(i=>Math.abs(i.y-f.y)<8)

rowItems.sort((a,b)=>a.x-b.x)

let texto=rowItems.map(i=>i.text).join(" ")

tabla.push({
texto:texto,
cp:f.cp
})

})

let html="<table>"
html+="<tr><th>Destino</th><th>CP</th><th>Tier</th></tr>"

tabla.forEach(r=>{

let matchType="matchNone"
let tier="-"

excelData.forEach(e=>{

let nombre=e["DESTINATARIO"]||""
let cpExcel=(e["CÓDIGO POSTAL Y LOCALIDAD"]||"").match(/\d{5}|\d{4}-\d{3}/)

if(cpExcel) cpExcel=cpExcel[0]

if(r.texto.includes(nombre) && r.cp==cpExcel){

matchType="matchExact"
tier=e["TIERS"]

}else{

let sim=similarity(r.texto,nombre)

if(sim>0.6 && r.cp==cpExcel){

matchType="matchFuzzy"
tier=e["TIERS"]

}

}

})

html+=`
<tr class="${matchType}">
<td>${r.texto}</td>
<td>${r.cp}</td>
<td>${tier}</td>
</tr>
`

})

html+="</table>"

resultado.innerHTML=html

}

</script>

</body>
</html>
