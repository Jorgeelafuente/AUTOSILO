<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Extractor SILOMAR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI, Arial;
margin:0;
background:#f2f5f8;
}

.topbar{
background:#0078c8;
color:white;
padding:15px 30px;
font-size:20px;
font-weight:600;
}

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:40px;
border-radius:6px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
background:#0078c8;
border:none;
padding:12px 20px;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">
Sistema Operativo Interno
</div>

<div class="container">

<h1>Extractor SILOMAR</h1>

<input type="file" id="pdfFile"><br><br>

<input type="file" id="excelFile"><br><br>

<button onclick="procesar()">Procesar</button>

<pre id="resultado"></pre>

</div>

<script>

let excelData = []

document.getElementById("excelFile").addEventListener("change", function(e){

const file = e.target.files[0]
const reader = new FileReader()

reader.onload = function(evt){

const data = new Uint8Array(evt.target.result)

const workbook = XLSX.read(data,{type:'array'})

const sheet = workbook.Sheets[workbook.SheetNames[0]]

excelData = XLSX.utils.sheet_to_json(sheet)

console.log("Excel cargado:",excelData)

}

reader.readAsArrayBuffer(file)

})


async function procesar(){

const resultado = document.getElementById("resultado")

resultado.textContent = "Procesando PDF..."

const file = document.getElementById("pdfFile").files[0]

if(!file){

resultado.textContent="Debes subir un PDF"
return

}

const buffer = await file.arrayBuffer()

const pdf = await pdfjsLib.getDocument({data:buffer}).promise

let items = []

for(let p=1;p<=pdf.numPages;p++){

const page = await pdf.getPage(p)

const content = await page.getTextContent()

content.items.forEach(i=>{

items.push({
text:i.str,
x:i.transform[4],
y:i.transform[5]
})

})

}

console.log(items)

resultado.textContent =
"PDF procesado correctamente\n\nFragmentos detectados: "+items.length

}

}

</script>

</body>
</html>
